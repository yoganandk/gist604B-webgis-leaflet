<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Page title (shown in browser tab) -->
  <title>Tucson Web Map</title>

  <!-- Leaflet CSS (required for map styling) -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />

  <!-- Custom CSS -->
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <!-- Optional title/header -->
  <div id="page-title">
    <h1>Tucson Cycleways and Restaurants</h1>
  </div>

  <!-- Map container (Leaflet targets this div by ID) -->
  <div id="map"></div>

  <footer id="page-footer">
  <p>Data: OpenStreetMap | Demo for GIST 604B</p>
</footer>

  <!-- Leaflet JavaScript (must come BEFORE your JS file) -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- Your custom JavaScript -->
  <script src="js/map_code.js"></script>

</body>
</html>
