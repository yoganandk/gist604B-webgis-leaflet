<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Page title (shown in browser tab) -->
  <title>Tucson Web Map</title>

  <!-- Leaflet CSS (required for map styling) -->
   <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
     integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
     crossorigin=""/>

  <!-- Make sure you put this AFTER Leaflet's CSS -->
 <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
     integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
     crossorigin=""></script>

  <!-- Custom CSS -->
  <link rel="stylesheet" href="css/styles.css">

  <!-- Custom JavaScript -->
  <script src="js/map_code.js"></script>
</head>
<body>

  <!-- Title/header -->
  <div id="page-title">
    <h1>Tucson Cycleways and Restaurants</h1>
  </div>

  <!-- Map container (Leaflet targets this div by ID) -->
  <div id="map"></div>

  <!-- Footer -->
  <footer id="page-footer">
  <p>Data: OpenStreetMap | Demo for GIST 604B</p>
</footer>
</body>
</html>
